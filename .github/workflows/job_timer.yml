name: Hourly Job Check
on:
  schedule:
    - cron: "0 * * * *" # This runs at the top of every hour
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install required libraries
        run: pip install python-jobspy requests pandas

      - name: Run Job Scraper
        env:
          # This pulls your Slack URL from the "Secrets" you set up earlier
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python job_notifier.py
      - name: Save Website to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Update job board" || exit 0
          git push
